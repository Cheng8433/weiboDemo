server:
  port: 8083

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

        - id: content-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/content/**
          filters:
            - StripPrefix=1

        - id: interaction-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/interaction/**
          filters:
            - StripPrefix=1

        - id: recommendation-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/recommendation/**
          filters:
            - StripPrefix=1

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600

      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            key-resolver: "#{@userKeyResolver}"

      logging:
        level:
          org.springframework.cloud.gateway: debug

jwt:
  secret: weibo-demo-jwt-secret-key-weibo-demo-jwt-secret-key
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always