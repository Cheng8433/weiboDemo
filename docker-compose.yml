version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: weibo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: weibo_user
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - weibo-network

  # Redis缓存
  redis:
    image: redis:6.2
    container_name: weibo-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - weibo-network

  # Kafka消息队列
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: weibo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - weibo-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: weibo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - weibo-network

  # Elasticsearch搜索引擎
  elasticsearch:
    image: elasticsearch:7.17.12
    container_name: weibo-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - "xpack.security.enabled=false"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - weibo-network

  # Nacos注册中心
  nacos:
    image: nacos/nacos-server:v2.2.0
    container_name: weibo-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: 123456
      MYSQL_SERVICE_DB_NAME: nacos_config
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs
    depends_on:
      - mysql
    networks:
      - weibo-network

  # 后端微服务
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: weibo-gateway
    ports:
      - "8080:8080"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
    depends_on:
      - nacos
      - mysql
      - redis
      - kafka
      - elasticsearch
    networks:
      - weibo-network

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: weibo-user-service
    ports:
      - "8081:8081"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
    depends_on:
      - nacos
      - mysql
      - redis
      - kafka
    networks:
      - weibo-network

  content-service:
    build:
      context: ./backend/content-service
      dockerfile: Dockerfile
    container_name: weibo-content-service
    ports:
      - "8082:8082"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      ELASTICSEARCH_URIS: http://elasticsearch:9200
    depends_on:
      - nacos
      - mysql
      - redis
      - kafka
      - elasticsearch
    networks:
      - weibo-network

  interaction-service:
    build:
      context: ./backend/interaction-service
      dockerfile: Dockerfile
    container_name: weibo-interaction-service
    ports:
      - "8083:8083"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
    depends_on:
      - nacos
      - mysql
      - redis
      - kafka
    networks:
      - weibo-network

  recommendation-service:
    build:
      context: ./backend/recommendation-service
      dockerfile: Dockerfile
    container_name: weibo-recommendation-service
    ports:
      - "8084:8084"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      ELASTICSEARCH_URIS: http://elasticsearch:9200
    depends_on:
      - nacos
      - mysql
      - redis
      - elasticsearch
    networks:
      - weibo-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: weibo-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - weibo-network

volumes:
  mysql_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  elasticsearch_data:
  nacos_data:
  nacos_logs:

networks:
  weibo-network:
    driver: bridge